<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0b1979">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="ISS Mobile">
    <title>ISS Mobile</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="phoneGuard" class="phone-guard hidden">
        <div class="guard-card">
            <img src="assets/icons/icon-192.png" alt="ISS" class="guard-logo">
            <h1>ISS Mobile</h1>
            <p>Open this on a phone in portrait view.</p>
        </div>
    </div>

    <main id="loginView" class="login-view hidden">
        <section class="login-top">
            <img src="assets/icons/icon-192.png" alt="ISS" class="login-logo">
            <div>
                <h1>ISS Mobile</h1>
                <p>Integrated School System</p>
            </div>
        </section>

        <section class="login-card">
            <label>Email</label>
            <input id="loginEmail" type="email" autocomplete="username" placeholder="email@example.com">

            <label>Password</label>
            <input id="loginPassword" type="password" autocomplete="current-password" placeholder="Password">

            <button id="loginBtn" class="primary-btn">Login</button>
            <button id="resetPasswordBtn" class="ghost-btn" type="button">Reset password</button>
            <p id="loginMessage" class="message"></p>
        </section>
    </main>

    <main id="appView" class="app-view hidden">
        <header class="app-header">
            <div>
                <p class="eyebrow">ISS Mobile</p>
                <h1 id="viewTitle">Home</h1>
            </div>
            <button id="logoutBtn" class="icon-btn" title="Logout" aria-label="Logout">↪</button>
        </header>

        <section id="homeScreen" class="screen active-screen">
            <div class="profile-card">
                <div class="avatar" id="userInitial">I</div>
                <div>
                    <h2 id="userName">User</h2>
                    <p id="userRoles">Authenticated</p>
                </div>
            </div>

            <div class="mini-grid">
                <article class="mini-card">
                    <strong id="homeLoadsCount">0</strong>
                    <span>Loads</span>
                </article>
                <article class="mini-card">
                    <strong id="homeAdvisoryCount">0</strong>
                    <span>Advisory</span>
                </article>
            </div>

            <p id="homeMessage" class="message compact"></p>
        </section>

        <section id="searchScreen" class="screen">
            <div class="search-row">
                <input id="studentSearchInput" type="search" placeholder="LRN or name">
                <button id="studentSearchBtn" class="primary-btn small-btn">Go</button>
            </div>
            <p id="studentSearchMessage" class="message compact"></p>
            <div id="studentResults" class="result-list"></div>
        </section>

        <section id="loadsScreen" class="screen">
            <div id="loadsList" class="card-list"></div>
            <p id="loadsMessage" class="message compact"></p>
        </section>

        <section id="gradeScreen" class="screen">
            <div class="screen-topline">
                <button id="backToLoadsBtn" class="ghost-btn small-btn">Back</button>
                <button id="saveGradesBtn" class="primary-btn small-btn">Save</button>
            </div>
            <h2 id="gradeTitle" class="section-title">Grades</h2>
            <p id="gradeSubtitle" class="subtitle"></p>
            <div class="search-row single">
                <input id="gradeSearchInput" type="search" placeholder="Filter learners">
            </div>
            <div id="gradeRows" class="grade-list"></div>
            <p id="gradeMessage" class="message compact"></p>
        </section>

        <section id="advisoryScreen" class="screen">
            <div class="search-row single">
                <input id="advisorySearchInput" type="search" placeholder="Filter advisory">
            </div>
            <div id="advisoryList" class="card-list"></div>
            <p id="advisoryMessage" class="message compact"></p>
        </section>

        <section id="plScreen" class="screen">
            <div class="filter-row">
                <select id="plTermFilter" aria-label="Term">
                    <option value="1">Term 1</option>
                    <option value="2">Term 2</option>
                    <option value="3">Term 3</option>
                </select>
            </div>
            <div id="plSubjectCards" class="card-list"></div>
            <p id="plMessage" class="message compact"></p>
        </section>

        <nav id="bottomNav" class="bottom-nav" aria-label="Mobile navigation">
            <button data-target="home" class="active">Home</button>
            <button data-target="search">Search</button>
            <button data-target="loads" class="role-loads">Loads</button>
            <button data-target="advisory" class="role-advisory">Advisory</button>
            <button data-target="pl" class="role-pl">PL</button>
        </nav>
    </main>

    <div id="studentSheet" class="sheet hidden">
        <div class="sheet-panel">
            <div class="sheet-header">
                <h2 id="studentSheetName">Student</h2>
                <button id="closeStudentSheetBtn" class="icon-btn">×</button>
            </div>
            <div id="studentSheetBody" class="sheet-body"></div>
        </div>
    </div>

    <div id="advisorySheet" class="sheet hidden">
        <div class="sheet-panel">
            <div class="sheet-header">
                <h2 id="advisorySheetName">Learner</h2>
                <button id="closeAdvisorySheetBtn" class="icon-btn">×</button>
            </div>
            <div id="advisorySheetBody" class="sheet-body"></div>
            <button id="saveAdvisoryProfileBtn" class="primary-btn full-btn">Save</button>
            <p id="advisorySheetMessage" class="message compact"></p>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/app.js"></script>
</body>
</html>
